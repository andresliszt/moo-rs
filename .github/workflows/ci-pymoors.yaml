name: pymoors CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: pymoors

env:
  DEFAULT_PYTHON: 3.12

jobs:
  coverage-python:
    name: Python Coverage
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C instrument-coverage"
      CARGO_INCREMENTAL: "0"
      CARGO_LLVM_COV: "1"
      RUST_BACKTRACE: "1"
      LLVM_PROFILE_FILE: "target/llvm-cov-target/coverage-%p-%m.profraw"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install rustfilt & coverage-prepare
        run: cargo install rustfilt coverage-prepare

      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install Pymoors (dev dependencies)
        run: |
          cargo llvm-cov clean --workspace
          make build-dev

      # === DEBUG BEFORE COVERAGE ===
      - name: DEBUG - Environment and paths before coverage
        run: |
          echo "=== DEBUG BEFORE COVERAGE ==="
          echo "PWD: $(pwd)"
          echo "User: $(whoami)"
          echo "Kernel: $(uname -a)"
          echo "RUSTFLAGS: ${RUSTFLAGS}"
          echo "CARGO_INCREMENTAL: ${CARGO_INCREMENTAL}"
          echo "CARGO_LLVM_COV: ${CARGO_LLVM_COV}"
          echo "RUST_BACKTRACE: ${RUST_BACKTRACE}"
          echo "LLVM_PROFILE_FILE: ${LLVM_PROFILE_FILE}"
          echo "--- Working directory listing ---"
          ls -la
          echo "--- Resolving profraw directory (dirname of LLVM_PROFILE_FILE) ---"
          PROF_DIR="$(dirname "${LLVM_PROFILE_FILE}")"
          echo "PROF_DIR: ${PROF_DIR}"
          ls -la "${PROF_DIR}" || echo "Directory ${PROF_DIR} does not exist yet."
          echo "--- Local target directory ---"
          ls -la target || echo "./target does not exist"
          echo "--- Parent target directory (just in case) ---"
          ls -la ../target || echo "../target does not exist"
          echo "--- Searching for .profraw before coverage ---"
          find . -type f -name '*.profraw' -maxdepth 5 || true
          echo "=== END DEBUG BEFORE COVERAGE ==="


      - name: Run coverage
        run: make coverage

      # === DEBUG AFTER COVERAGE ===
      - name: DEBUG - Inspect profraw and target after coverage
        run: |
          echo "=== DEBUG AFTER COVERAGE ==="
          echo "PWD: $(pwd)"
          echo "LLVM_PROFILE_FILE: ${LLVM_PROFILE_FILE}"
          PROF_DIR="$(dirname "${LLVM_PROFILE_FILE}")"
          echo "PROF_DIR: ${PROF_DIR}"
          echo "--- Listing profraw directory ---"
          ls -la "${PROF_DIR}" || echo "profraw directory not found."
          echo "--- Search for .profraw across workspace ---"
          find . -type f -name '*.profraw' || true
          echo "--- Local target directory ---"
          ls -la target || echo "./target does not exist"
          echo "--- Recursive listing of target (limited) ---"
          ls -R target | head -n 500 || echo "Unable to list target."
          echo "=== END DEBUG AFTER COVERAGE ==="

      - name: Generate Rust LCOV from profraw
        run: |
          cargo llvm-cov report --lcov --output-path coverage.lcov


      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          working-directory: pymoors
          disable_search: true
          flags: pymoors
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          working-directory: pymoors
          disable_search: true
          flags: pymoors-rust
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Build Pymoors (release)
        run: make build-release

      - name: Build documentation
        run: make docs

  test-python:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          working-directory: pymoors

      - name: Build Pymoors (production)
        run: make build-release

      - name: Run tests (excluding benchmarks)
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (with fmt & clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Pymoors (dev)
        run: make build-dev

      - name: Lint Python
        run: make lint-python

      - name: Lint Rust bindings
        run: make lint-rust

      - name: Type-check Python
        run: make pyright

  check:
    if: always()
    needs: [coverage-python, test-python, build-docs, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-failures: coverage
